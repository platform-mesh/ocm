components:
  - name: "{{ .COMPONENT_NAME }}"
    version: "{{ .VERSION }}"
    provider:
      name: Platform Mesh Team
    componentReferences:
      - name: chart
        componentName: "github.com/platform-mesh/helm-charts/{{ .CHART_NAME }}"
        version: "{{ .VERSION }}"
      - name: image
        componentName: "github.com/platform-mesh/images/{{ .IMAGE_COMPONENT_NAME }}"
        version: "{{ .APP_VERSION }}"
      - name: api-syncagent
        componentName: github.com/kcp-dev/api-syncagent
        version: "0.4.4"
      - name: ingress-nginx
        componentName: github.com/kubernetes/ingress-nginx
        version: "4.11.3"