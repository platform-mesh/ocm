components:
  - name: github.com/kubernetes-sigs/gateway-api
    version: {{ .GATEWAY_API_VERSION }}
    provider:
      name: gateway-api
    resources:
      - name: crds
        type: gitOpsTemplate
        relation: external
        version: {{ .GATEWAY_API_VERSION }}
        access:
          type: github
          repoUrl: https://github.com/kubernetes-sigs/gateway-api
          ref: {{ .GATEWAY_API_VERSION }}
          commit: {{ .GATEWAY_API_COMMIT }}
  - name: github.com/traefik/traefik
    version: {{ .TRAEFIK_VERSION }}
    provider:
      name: traefik
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .TRAEFIK_CHART_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/traefik:{{ .TRAEFIK_CHART_VERSION }}
      - name: crds
        type: helmChart
        relation: local
        version: {{ .TRAEFIK_CRD_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/traefik-crds:{{ .TRAEFIK_CRD_VERSION }}
      - name: image
        type: ociImage
        relation: local
        version: {{ .TRAEFIK_IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: "docker.io/library/traefik:{{ .TRAEFIK_IMAGE_VERSION }}"
  - name: github.com/cert-manager/cert-manager
    version: {{ .CERT_MANAGER_VERSION }}
    provider:
      name: cert-manager
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .CERT_MANAGER_VERSION }}
        access:
          type: ociArtifact
          imageReference: quay.io/jetstack/charts/cert-manager:{{ .CERT_MANAGER_VERSION }}
      - name: webhook-image
        type: ociImage
        relation: local
        version: {{ .CERT_MANAGER_VERSION }}
        access:
          type: ociArtifact
          imageReference: "quay.io/jetstack/cert-manager-webhook:{{ .CERT_MANAGER_VERSION }}"
      - name: controller-image
        type: ociImage
        relation: local
        version: {{ .CERT_MANAGER_VERSION }}
        access:
          type: ociArtifact
          imageReference: "quay.io/jetstack/cert-manager-controller:{{ .CERT_MANAGER_VERSION }}"
      - name: cainjector-image
        type: ociImage
        relation: local
        version: {{ .CERT_MANAGER_VERSION }}
        access:
          type: ociArtifact
          imageReference: "quay.io/jetstack/cert-manager-cainjector:{{ .CERT_MANAGER_VERSION }}"
  - name: github.com/openfga/openfga
    version: {{ .PM_OPENFGA_VERSION }}
    provider:
      name: openfga
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .OPENFGA_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/openfga:{{ .OPENFGA_VERSION }}
      - name: image
        type: ociImage
        relation: local
        version: {{ .OPENFGA_IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: "docker.io/openfga/openfga:{{ .OPENFGA_IMAGE_VERSION }}"
      - name: postgresql-image
        type: ociImage
        relation: local
        version: {{ .OPENFGA_POSTGRESQL_IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: "ghcr.io/platform-mesh/upstream-images/postgresql:{{ .OPENFGA_POSTGRESQL_IMAGE_VERSION }}"
  - name: github.com/kcp-dev/kcp-operator
    version: {{ .KCP_OPERATOR_CHART_VERSION }}
    provider:
      name: kcp
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .KCP_OPERATOR_CHART_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/kcp-operator:{{ .KCP_OPERATOR_CHART_VERSION }}
      - name: image
        type: ociImage
        relation: local
        version: {{ .KCP_OPERATOR_IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: "ghcr.io/kcp-dev/kcp-operator:{{ .KCP_OPERATOR_IMAGE_VERSION }}"
  - name: github.com/kcp-dev/kcp
    version: {{ .KCP_VERSION }}
    provider:
      name: kcp
    resources:
      - name: image
        type: ociImage
        relation: local
        version: {{ .KCP_VERSION }}
        access:
          type: ociArtifact
          imageReference: "ghcr.io/kcp-dev/kcp:{{ .KCP_VERSION }}"
  - name: github.com/kcp-dev/init-agent
    version: {{ .INIT_AGENT_CHART_VERSION }}
    provider:
      name: kcp
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .INIT_AGENT_CHART_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/init-agent:{{ .INIT_AGENT_CHART_VERSION }}
      - name: image
        type: ociImage
        relation: local
        version: {{ .INIT_AGENT_IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: "ghcr.io/kcp-dev/init-agent:{{ .INIT_AGENT_IMAGE_VERSION }}"
  - name: github.com/cloudnative-pg/cloudnative-pg
    version: {{ .CNPG_OPERATOR_CHART_VERSION }}
    provider:
      name: cloudnative-pg
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .CNPG_OPERATOR_CHART_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/cloudnative-pg/charts/cloudnative-pg:{{ .CNPG_OPERATOR_CHART_VERSION }}
      - name: image
        type: ociImage
        relation: local
        version: {{ .CNPG_OPERATOR_IMAGE_VERSION }}
        access:
          type: ociArtifact
          imageReference: "ghcr.io/cloudnative-pg/cloudnative-pg:{{ .CNPG_OPERATOR_IMAGE_VERSION }}"
  - name: github.com/prometheus-community/prometheus-operator-crds
    version: {{ .PROMETHEUS_OPERATOR_CRDS_VERSION }}
    provider:
      name: prometheus-community
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .PROMETHEUS_OPERATOR_CRDS_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/prometheus-operator-crds:{{ .PROMETHEUS_OPERATOR_CRDS_VERSION }}
  - name: github.com/prometheus-community/kube-prometheus-stack
    version: {{ .KUBE_PROMETHEUS_STACK_VERSION }}
    provider:
      name: prometheus-community
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .KUBE_PROMETHEUS_STACK_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/ocm/charts/kube-prometheus-stack:{{ .KUBE_PROMETHEUS_STACK_VERSION }}
  - name: github.com/open-telemetry/opentelemetry-operator
    version: {{ .OPENTELEMETRY_OPERATOR_VERSION }}
    provider:
      name: open-telemetry
    resources:
      - name: chart
        type: helmChart
        relation: local
        version: {{ .OPENTELEMETRY_OPERATOR_VERSION }}
        access:
          type: ociArtifact
          imageReference: ghcr.io/open-telemetry/opentelemetry-helm-charts/opentelemetry-operator:{{ .OPENTELEMETRY_OPERATOR_VERSION }}
  - name: github.com/platform-mesh/platform-mesh
    version: {{ .VERSION }}
    provider:
      name: The Platform Mesh Team
    componentReferences:
      - name: account-operator
        componentName: github.com/platform-mesh/account-operator
        version: {{ .ACCOUNT_OPERATOR_VERSION }}
      - name: etcd-druid
        componentName: github.com/gardener/etcd-druid
        version: {{ .GARDENER_ETCD_DRUID_VERSION }}
      - name: extension-manager-operator
        componentName: github.com/platform-mesh/extension-manager-operator
        version: {{ .EXTENSION_MANAGER_OPERATOR_VERSION }}
      - name: example-httpbin-operator
        componentName: github.com/platform-mesh/example-httpbin-operator
        version: {{ .EXAMPLE_HTTPBIN_OPERATOR_VERSION }}
      - name: infra
        componentName: github.com/platform-mesh/infra
        version: {{ .INFRA_VERSION }}
      - name: keycloak
        componentName: github.com/platform-mesh/keycloak
        version: {{ .PM_KEYCLOAK_VERSION }}
      - name: keycloak-operator
        componentName: github.com/platform-mesh/keycloak-operator
        version: {{ .KEYCLOAK_OPERATOR_VERSION }}
      - name: kcp-operator
        componentName: github.com/kcp-dev/kcp-operator
        version: {{ .KCP_OPERATOR_CHART_VERSION }}
      - name: kcp
        componentName: github.com/kcp-dev/kcp
        version: {{ .KCP_VERSION }}
      - name: init-agent
        componentName: github.com/kcp-dev/init-agent
        version: {{ .INIT_AGENT_CHART_VERSION }}
      - name: kubernetes-graphql-gateway
        componentName: github.com/platform-mesh/kubernetes-graphql-gateway
        version: {{ .KUBERNETES_GRAPHQL_GATEWAY_VERSION }}
      - name: rebac-authz-webhook
        componentName: github.com/platform-mesh/rebac-authz-webhook
        version: {{ .REBAC_AUTHZ_WEBHOOK_VERSION }}
      - name: security-operator
        componentName: github.com/platform-mesh/security-operator
        version: {{ .SECURITY_OPERATOR_VERSION }}
      - name: openfga
        componentName: github.com/openfga/openfga
        version: {{ .PM_OPENFGA_VERSION }}
      - name: platform-mesh-operator
        componentName: github.com/platform-mesh/platform-mesh-operator
        version: {{ .PLATFORM_MESH_OPERATOR_VERSION }}
      - name: portal
        componentName: github.com/platform-mesh/portal
        version: {{ .PORTAL_VERSION }}
      - name: virtual-workspaces
        componentName: github.com/platform-mesh/virtual-workspaces
        version: {{ .VIRTUAL_WORKSPACES_VERSION }}
      - name: iam-service
        componentName: github.com/platform-mesh/iam-service
        version: {{ .IAM_SERVICE_VERSION }}
      - name: iam-ui
        componentName: github.com/platform-mesh/iam-ui
        version: {{ .IAM_UI_VERSION }}
      - name: marketplace-ui
        componentName: github.com/platform-mesh/marketplace-ui
        version: {{ .MARKETPLACE_UI_VERSION }}
      - name: gateway-api
        componentName: github.com/kubernetes-sigs/gateway-api
        version: {{ .GATEWAY_API_VERSION }}
      - name: traefik
        componentName: github.com/traefik/traefik
        version: {{ .TRAEFIK_VERSION }}
      - name: terminal-controller-manager
        componentName: github.com/platform-mesh/terminal-controller-manager
        version: {{ .TERMINAL_CONTROLLER_MANAGER_VERSION }}
      - name: cert-manager
        componentName: github.com/cert-manager/cert-manager
        version: {{ .CERT_MANAGER_VERSION }}
      - name: observability
        componentName: github.com/platform-mesh/observability
        version: {{ .OBSERVABILITY_VERSION }}
      - name: cnpg-operator
        componentName: github.com/cloudnative-pg/cloudnative-pg
        version: {{ .CNPG_OPERATOR_CHART_VERSION }}
      - name: prometheus-operator-crds
        componentName: github.com/prometheus-community/prometheus-operator-crds
        version: {{ .PROMETHEUS_OPERATOR_CRDS_VERSION }}
      - name: kube-prometheus-stack
        componentName: github.com/prometheus-community/kube-prometheus-stack
        version: {{ .KUBE_PROMETHEUS_STACK_VERSION }}
      - name: opentelemetry-operator
        componentName: github.com/open-telemetry/opentelemetry-operator
        version: {{ .OPENTELEMETRY_OPERATOR_VERSION }}
